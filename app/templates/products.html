
<html>
<head>
    <title>List of Products</title>
    <!-- Include Bootstrap CSS link here -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h1 class="mt-5">List of Products</h1>
        
        <form class="form-inline mt-3" method="get">
            <div class="form-group mb-2">
                <label for="filterName" class="sr-only">Filter by Name</label>
                <input type="text" class="form-control" id="filterName" name="name" placeholder="Filter by Name">
            </div>
            <button type="submit" class="btn btn-primary mb-2">Filter</button>
        </form>
        <form class="form-inline mt-3" method="get">
            <div class="form-group mb-2">
                <label for="filterBarcode" class="sr-only">Filter by barcode</label>
                <input type="text" class="form-control" id="filterBarcode" name="barcode" placeholder="Filter by Barcode">
            </div>
            <button type="submit" class="btn btn-primary mb-2">Filter</button>
        </form>
        
        
        <div class="table-responsive mt-3">
            <table class="table table-striped table-bordered table-hover table-dark">
                <thead>
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Code</th>
                        <th scope="col">Name</th>
                        <th scope="col">Group</th>
                        <th scope="col">Barcode</th>
                        <th scope="col">Price</th>
                        <th scope="col">Delete</th>
                    </tr>
                </thead>
                <tbody>
                        {% for product in products %}
                        <tr>
                            <td>{{ forloop.counter }}</td>
                            <td>{{ product.id }}</td>
                            <td>{{ product.name }}</td>
                            <td>{{ product.group }}</td>
                            <td>{{ product.barcode }}</td>
                            <td>{{ product.price }}</td>
                            <td><a href="{% url 'delete_product' product.id %}" class="btn btn-danger btn-sm"><i class="fa fa-trash"></i></a></td>
                        </tr>
                        {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    <!-- Include Bootstrap JS and Font Awesome -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://kit.fontawesome.com/a076d05399.js"></script>
</body>
</html>
